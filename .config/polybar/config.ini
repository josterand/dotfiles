include-file = ~/.config/polybar/modules.ini

[bar/main-bar]
width = 100%
height = 18pt
radius = 6
; dpi = 96

modules-left = xworkspaces title
modules-right = cpu memory pulseaudio battery network datetime

font-0 = "JetBrainsMonoNerd Font:size=10;3"

background = ${colors.background}
foreground = ${colors.foreground}
border-size = 4pt
border-color = #00000000
line-size = 1pt
separator = |
padding-left = 0
padding-right = 1
module-margin = 1
enable-ipc = true
bottom = true

[settings]
screenchange-reload = true
pseudo-transparency = true

[colors]
background = #070E26
background-alt = #001830
foreground = #F6F0F5
primary = #18C5D9
secondary = #8C2020
alert = #F23847
disabled = #707880